<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>問卷管理後台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <style>
    /* ── 番號管理 ── */
    .content-wrap { padding: 1.5rem; background: #fff; border-radius: 8px; border: 1px solid var(--border); }
    .roster-hint { font-size: .85rem; color: var(--muted); margin-bottom: 1.25rem; }
    .roster-grid { display: flex; flex-direction: column; }
    .roster-row { display: grid; grid-template-columns: 64px 1fr 1fr auto; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .roster-row:last-child { border-bottom: none; }
    .roster-num { font-weight: 700; color: var(--primary); font-size: .95rem; }
    .roster-input { padding: .5rem .75rem; border: 1.5px solid var(--border); border-radius: 6px; font-size: .9rem; font-family: inherit; transition: border-color .2s; width: 100%; }
    .roster-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }

    /* ── 值班月曆 ── */
    .cal-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
    .cal-title { font-size: 1.1rem; font-weight: 700; min-width: 110px; text-align: center; }
    .cal-dow-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
    .cal-dow-label { text-align: center; font-size: .75rem; font-weight: 600; color: var(--muted); padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-cell { border: 1.5px solid var(--border); border-radius: 6px; padding: 6px 4px; min-height: 68px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .cal-cell.empty { background: #f8fafc; border-color: transparent; }
    .cal-cell.today { border-color: var(--primary); background: #f5f3ff; }
    .cal-day { font-size: .8rem; font-weight: 600; color: var(--text); }
    .cal-cell.today .cal-day { color: var(--primary); }
    .cal-select { width: 100%; font-size: .75rem; padding: 3px 2px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; text-align: center; }
    .cal-select:focus { outline: none; border-color: var(--primary); }
    .cal-save-bar { margin-top: 1.25rem; display: flex; justify-content: flex-end; }
    @media (max-width: 600px) {
      .roster-row { grid-template-columns: 52px 1fr 1fr auto; gap: 6px; }
      .cal-cell { min-height: 54px; padding: 4px 2px; }
      .cal-select { font-size: .7rem; }
    }
    /* ── 定型稿快速語句 ── */
    .phrase-section { margin-top: 1rem; border-top: 1px solid var(--border); padding-top: .9rem; }
    .phrase-label { font-size: .78rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .45rem; }
    .phrase-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: .65rem; }
    .phrase-chip { background: #f1f5f9; border: 1.5px solid var(--border); border-radius: 20px; padding: 3px 11px; font-size: .82rem; font-family: inherit; cursor: pointer; transition: background .15s, border-color .15s, color .15s; }
    .phrase-chip:hover { background: #ede9fe; border-color: var(--primary); color: var(--primary); }
    .custom-phrase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .custom-phrase-input { padding: 5px 9px; border: 1.5px solid var(--border); border-radius: 6px; font-size: .82rem; font-family: inherit; transition: border-color .2s; cursor: pointer; }
    .custom-phrase-input:focus { outline: none; border-color: var(--primary); cursor: text; }
    .custom-phrase-input:hover:not(:focus) { border-color: var(--primary); background: #fafafe; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-icon">📋</span>
      <h1>問卷管理後台</h1>
      <p>限內部授權人員使用</p>
    </div>
    <form id="loginForm" novalidate>
      <div class="field-group">
        <label for="loginEmail">電子郵件</label>
        <input type="email" id="loginEmail" placeholder="your@company.com"
               autocomplete="email" required />
      </div>
      <div class="field-group">
        <label for="loginPassword">密碼</label>
        <input type="password" id="loginPassword" placeholder="••••••••"
               autocomplete="current-password" required />
      </div>
      <div id="loginError" class="login-error" hidden></div>
      <button type="submit" class="btn-primary full-width" id="loginBtn">登入</button>
    </form>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     APP SHELL（登入後顯示）
══════════════════════════════════════════════ -->
<div id="appShell" hidden>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">📋</span>
      <span>問卷後台</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="submissions"
              onclick="switchView('submissions')">
        <span class="nav-icon">📥</span>
        <span>回應管理</span>
        <span class="nav-badge" id="activeBadge">0</span>
      </button>
      <button class="nav-item" data-view="cases"
              onclick="switchView('cases')">
        <span class="nav-icon">📁</span>
        <span>結案紀錄</span>
      </button>
      <button class="nav-item" data-view="roster"
              onclick="switchView('roster')">
        <span class="nav-icon">👤</span>
        <span>番號管理</span>
      </button>
      <button class="nav-item" data-view="calendar"
              onclick="switchView('calendar')">
        <span class="nav-icon">📅</span>
        <span>值班月曆</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">?</div>
        <span class="user-email" id="userEmail">–</span>
      </div>
      <button class="btn-logout" onclick="handleLogout()">登出</button>
    </div>
  </aside>

  <!-- ── Main Area ── -->
  <div class="main-area">

    <!-- ── 回應管理 View ── -->
    <div id="view-submissions" class="view-panel">
      <header class="view-header">
        <h2>回應管理</h2>
        <div class="stat-chips">
          <span class="chip chip-new">新進 <strong id="countNew">0</strong></span>
          <span class="chip chip-proc">處理中 <strong id="countProc">0</strong></span>
          <span class="chip chip-done">已結案 <strong id="countDone">0</strong></span>
        </div>
      </header>

      <div class="filter-bar">
        <div class="filter-tabs">
          <button class="tab active" data-f="active"   onclick="setFilter('active')">待處理</button>
          <button class="tab"        data-f="新進"     onclick="setFilter('新進')">新進</button>
          <button class="tab"        data-f="處理中"   onclick="setFilter('處理中')">處理中</button>
          <button class="tab"        data-f="已結案"   onclick="setFilter('已結案')">已結案</button>
          <button class="tab"        data-f="all"      onclick="setFilter('all')">全部</button>
        </div>
        <input type="search" id="searchInput" class="search-input"
               placeholder="搜尋姓名或 Email…" />
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th class="sortable" onclick="toggleSort('submitted_at')">
                填寫時間 <span class="sort-arrow" id="sort-submitted_at">↕</span>
              </th>
              <th>姓名</th>
              <th>手機號碼</th>
              <th>案件類別</th>
              <th>狀態</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="submissionsBody">
            <tr><td colspan="6" class="loading-row">載入中…</td></tr>
          </tbody>
        </table>
      </div>
    </div><!-- /view-submissions -->

    <!-- ── 結案紀錄 View ── -->
    <div id="view-cases" class="view-panel" hidden>
      <header class="view-header">
        <h2>結案紀錄</h2>
        <button class="btn-outline" onclick="exportCSV()">⬇ 匯出 CSV</button>
      </header>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>結案時間</th>
              <th>填寫者姓名</th>
              <th>手機號碼</th>
              <th>案件類別</th>
              <th>處理人員</th>
              <th>處理結果摘要</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="casesBody">
            <tr><td colspan="7" class="loading-row">載入中…</td></tr>
          </tbody>
        </table>
      </div>
    </div><!-- /view-cases -->

    <!-- ── 番號管理 View ── -->
    <div id="view-roster" class="view-panel" hidden>
      <header class="view-header">
        <h2>番號管理</h2>
      </header>
      <div class="content-wrap">
        <p class="roster-hint">設定第 1–5 番的值班人員姓名與手機號碼，各番獨立儲存。儲存後當日填表人員即可在送出申請後看到今日值班人員的聯絡資訊。</p>
        <div class="roster-grid" id="rosterGrid">
          <div style="text-align:center; padding:2rem; color:var(--muted)">載入中…</div>
        </div>
      </div>
    </div><!-- /view-roster -->

    <!-- ── 值班月曆 View ── -->
    <div id="view-calendar" class="view-panel" hidden>
      <header class="view-header">
        <h2>值班月曆</h2>
      </header>
      <div class="content-wrap">
        <div class="cal-toolbar">
          <button class="btn-outline" onclick="prevMonth()">◀</button>
          <span class="cal-title" id="calTitle"></span>
          <button class="btn-outline" onclick="nextMonth()">▶</button>
        </div>
        <div class="cal-dow-header">
          <div class="cal-dow-label">日</div>
          <div class="cal-dow-label">一</div>
          <div class="cal-dow-label">二</div>
          <div class="cal-dow-label">三</div>
          <div class="cal-dow-label">四</div>
          <div class="cal-dow-label">五</div>
          <div class="cal-dow-label">六</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-save-bar">
          <button class="btn-primary" onclick="saveCalendar()">💾 儲存本月排班</button>
        </div>
      </div>
    </div><!-- /view-calendar -->

  </div><!-- /main-area -->
</div><!-- /appShell -->


<!-- ══════════════════════════════════════════════
     SIDE PANEL：回應詳情
══════════════════════════════════════════════ -->
<div id="detailOverlay" class="overlay" onclick="closeDetail()"></div>

<div id="detailPanel" class="side-panel">
  <div class="panel-header">
    <h3>回應詳情</h3>
    <button class="btn-icon" onclick="closeDetail()">✕</button>
  </div>
  <div class="panel-body" id="detailBody">
    <!-- 由 JS 動態填入 -->
  </div>
</div>


<!-- ══════════════════════════════════════════════
     MODAL：結案
══════════════════════════════════════════════ -->
<div id="closeCaseModal" class="modal-overlay" hidden>
  <div class="modal-box">
    <div class="modal-header">
      <h3>🔒 結案</h3>
      <button class="btn-icon" onclick="hideCloseCaseModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label>處理人員姓名 <span class="required">*</span></label>
        <input type="text" id="handlerName" placeholder="請輸入您的姓名" />
      </div>
      <div class="field-group">
        <label>處理結果 <span class="required">*</span></label>
        <div class="option-group" style="flex-direction:column;gap:8px;margin-top:.35rem;">
          <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer;padding:.55rem .85rem;border:1.5px solid var(--border);border-radius:8px;transition:border-color .15s;">
            <input type="radio" name="handlingResultRadio" id="hrGo"   value="前往現場勘察"   style="accent-color:var(--primary);" onchange="syncHandlingResult()" />
            <span style="font-size:.93rem;">前往現場勘察</span>
          </label>
          <label style="display:flex;align-items:center;gap:.6rem;cursor:pointer;padding:.55rem .85rem;border:1.5px solid var(--border);border-radius:8px;transition:border-color .15s;">
            <input type="radio" name="handlingResultRadio" id="hrDefer" value="暫緩現場勘察" style="accent-color:var(--primary);" onchange="syncHandlingResult()" />
            <span style="font-size:.93rem;">暫緩現場勘察</span>
          </label>
        </div>
        <input type="hidden" id="handlingResult" value="" />
      </div>
      <div class="field-group">
        <label>案件摘要 <span class="required">*</span></label>
        <textarea id="caseSummaryText" rows="18"
          placeholder="點擊下方語句可帶入游標位置…" style="font-size:.85rem;line-height:1.7;font-family:inherit;"></textarea>
        <!-- 快速語句面板 -->
        <div id="phrasePanelContainer"></div>
      </div>
      <div class="modal-info">⏱ 結案時間將自動記錄為目前時間</div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="hideCloseCaseModal()">取消</button>
      <button class="btn-danger"  id="confirmCloseBtn" onclick="confirmCloseCase()">確認結案</button>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════
     MODAL：結案詳情（查看歷史紀錄）
══════════════════════════════════════════════ -->
<div id="caseDetailModal" class="modal-overlay" hidden
     onclick="hideCaseDetailModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3>📁 結案詳情</h3>
      <button class="btn-icon" onclick="hideCaseDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="caseDetailBody">
      <!-- 由 JS 動態填入 -->
    </div>
  </div>
</div>


<!-- Toast -->
<div id="toast" class="toast"></div>


<!-- ══════════════════════════════════════════════
     SCRIPTS
══════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ======================================================
// ⚙️ 設定區 — 從 Supabase 控制台複製貼上
// ======================================================
const SUPABASE_URL      = 'https://ljwdflbqalrchraejjjt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxqd2RmbGJxYWxyY2hyYWVqamp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NTgwNDYsImV4cCI6MjA5NTQzNDA0Nn0.if3F3xB3HUwDCuCbZqK8JR-zyLIeAGT4bDHUoIeGZfc';

// ── 初始化 Supabase Client ──
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
const S = {
  user:         null,
  submissions:  [],
  caseRecords:  [],
  filtered:     [],
  filter:       'active',
  search:       '',
  sort:         { field: 'submitted_at', dir: 'desc' },
  pendingId:    null,
};

// ════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════
async function initAuth() {
  showLoginPage();

  const { data: { session } } = await sb.auth.getSession();

  if (session?.user?.email) {
    S.user = session.user;
    showApp();
  } else if (session) {
    await sb.auth.signOut();
  }

  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session?.user?.email) {
      S.user = session.user;
      showApp();
    } else if (event === 'SIGNED_OUT') {
      S.user = null;
      showLoginPage();
    }
  });
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');

  errEl.hidden = true;
  btn.disabled = true;
  btn.textContent = '登入中…';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = error.message.includes('Invalid')
      ? '帳號或密碼錯誤，請重新確認。'
      : error.message;
    errEl.hidden = false;
  }
  btn.disabled = false;
  btn.textContent = '登入';
});

async function handleLogout() {
  await sb.auth.signOut();
}

function showLoginPage() {
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('appShell').hidden = true;
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').hidden = false;

  const email = S.user?.email || '';
  document.getElementById('userEmail').textContent = email;
  document.getElementById('userAvatar').textContent = (email[0] || '?').toUpperCase();

  loadSubmissions();
  setupRealtime();
}

// ════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════
function switchView(view) {
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.view === view)
  );
  document.getElementById('view-submissions').hidden = (view !== 'submissions');
  document.getElementById('view-cases').hidden       = (view !== 'cases');
  document.getElementById('view-roster').hidden      = (view !== 'roster');
  document.getElementById('view-calendar').hidden    = (view !== 'calendar');

  if (view === 'cases')    loadCaseRecords();
  if (view === 'roster')   loadRoster();
  if (view === 'calendar') loadCalendar();
}

// ════════════════════════════════════════════════════════
// 回應管理 — 資料
// ════════════════════════════════════════════════════════
async function loadSubmissions() {
  const { data, error } = await sb
    .from('submissions')
    .select('*')
    .order('submitted_at', { ascending: false });

  if (error) { console.error('loadSubmissions:', error); return; }
  S.submissions = data || [];
  updateCounts();
  applyFilter();
}

function updateCounts() {
  const n = S.submissions.filter(s => s.status === '新進').length;
  const p = S.submissions.filter(s => s.status === '處理中').length;
  const d = S.submissions.filter(s => s.status === '已結案').length;
  document.getElementById('countNew').textContent  = n;
  document.getElementById('countProc').textContent = p;
  document.getElementById('countDone').textContent = d;
  document.getElementById('activeBadge').textContent = n + p;
}

function setFilter(f) {
  S.filter = f;
  document.querySelectorAll('.tab').forEach(el =>
    el.classList.toggle('active', el.dataset.f === f)
  );
  applyFilter();
}

let _searchTimer;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    S.search = e.target.value.trim().toLowerCase();
    applyFilter();
  }, 280);
});

function toggleSort(field) {
  S.sort.dir = (S.sort.field === field && S.sort.dir === 'desc') ? 'asc' : 'desc';
  S.sort.field = field;
  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '↕');
  const arrow = document.getElementById('sort-' + field);
  if (arrow) arrow.textContent = (S.sort.dir === 'asc') ? '↑' : '↓';
  applyFilter();
}

function applyFilter() {
  let list = [...S.submissions];

  if (S.filter === 'active') {
    list = list.filter(s => s.status !== '已結案');
  } else if (S.filter !== 'all') {
    list = list.filter(s => s.status === S.filter);
  }

  if (S.search) {
    list = list.filter(s =>
      (s.name  || '').toLowerCase().includes(S.search) ||
      (s.email || '').toLowerCase().includes(S.search)
    );
  }

  list.sort((a, b) => {
    const { field, dir } = S.sort;
    const va = a[field] ?? '';
    const vb = b[field] ?? '';
    const cmp = String(va).localeCompare(String(vb), 'zh-TW');
    return dir === 'asc' ? cmp : -cmp;
  });

  S.filtered = list;
  renderSubmissions();
}

function renderSubmissions() {
  const tbody = document.getElementById('submissionsBody');
  if (S.filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-row">目前沒有符合條件的回應</td></tr>`;
    return;
  }
  tbody.innerHTML = S.filtered.map(s => `
    <tr class="clickable" onclick="openDetail('${s.id}')">
      <td>${fmt(s.submitted_at)}</td>
      <td>${esc(s.name)}</td>
      <td class="cell-muted">${esc(s.email)}</td>
      <td>${esc(s.source || '–')}</td>
      <td><span class="badge badge-${statusCls(s.status)}">${s.status}</span></td>
      <td>
        <button class="btn-sm"
          onclick="event.stopPropagation(); openDetail('${s.id}')">查看</button>
      </td>
    </tr>
  `).join('');
}

// ════════════════════════════════════════════════════════
// 詳情側邊欄
// ════════════════════════════════════════════════════════
function openDetail(id) {
  const s = S.submissions.find(x => x.id === id);
  if (!s) return;
  const closed = s.status === '已結案';

function _parseSugg(s) {
  const r = {};
  (s || '').split('\n').forEach(l => { const i = l.indexOf('：'); if (i > -1) r[l.slice(0,i)] = l.slice(i+1); });
  return r;
}

function insertPhrase(text) {
  const ta = document.getElementById('caseSummaryText');
  const s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
  ta.value = v.slice(0, s) + text + v.slice(e);
  ta.selectionStart = ta.selectionEnd = s + text.length;
  ta.focus();
}

function saveCustomPhrases() {
  const arr = [];
  for (let i = 0; i < 10; i++) arr.push(document.getElementById('cp'+i)?.value || '');
  localStorage.setItem('custom_phrases', JSON.stringify(arr));
}

function renderPhrasePanel(source) {
  const opts = CASE_OPTIONS[source] || [];
  const saved = JSON.parse(localStorage.getItem('custom_phrases') || JSON.stringify(Array(10).fill('')));
  const esc = t => t.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  let h = `<div class="phrase-section">`;
  if (opts.length) {
    h += `<div class="phrase-label">📋 問卷選項快速帶入</div><div class="phrase-chips">`;
    opts.forEach(o => { h += `<button type="button" class="phrase-chip" onclick="insertPhrase('${esc(o)}')">${o}</button>`; });
    h += `</div>`;
  }
  h += `<div class="phrase-label" style="margin-top:.6rem">✏️ 自訂語句（點一下帶入；修改後自動儲存）</div><div class="custom-phrase-grid">`;
  for (let i = 0; i < 10; i++) {
    const v = (saved[i] || '').replace(/"/g,'&quot;');
    h += `<input type="text" id="cp${i}" class="custom-phrase-input" value="${v}" placeholder="自訂語句 ${i+1}"
      onchange="saveCustomPhrases()"
      onclick="const v=this.value.trim();if(v)insertPhrase(v)" />`;
  }
  h += `</div></div>`;
  document.getElementById('phrasePanelContainer').innerHTML = h;
}

function showCloseCaseModal(id) {
  closeAllModals();
  S.pendingId = id;
  const sub = S.submissions.find(s => s.id === id);
  document.getElementById('handlerName').value    = '';
  document.getElementById('handlingResult').value = '';
  document.querySelectorAll('[name="handlingResultRadio"]').forEach(r => r.checked = false);
  document.getElementById('caseSummaryText').value = sub ? buildTemplate(sub) : '';
  document.getElementById('phrasePanelContainer').innerHTML = '';
  if (sub?.source) renderPhrasePanel(sub.source);
  document.getElementById('closeCaseModal').hidden = false;
}

async function confirmCloseCase() {
  const handlerName     = document.getElementById('handlerName').value.trim();
  const handlingResult  = document.getElementById('handlingResult').value.trim();
  const caseSummary     = document.getElementById('caseSummaryText').value.trim();

  if (!handlerName || !handlingResult || !caseSummary) {
    showToast('❌ 請填寫所有必填欄位', 'error');
    return;
  }

  const sub = S.submissions.find(s => s.id === S.pendingId);
  if (!sub) return;

  const btn = document.getElementById('confirmCloseBtn');
  btn.disabled = true;
  btn.textContent = '結案中…';

  const { error } = await sb.from('case_records').insert({
    submission_id:        S.pendingId,
    handler_name:         handlerName,
    handling_result:      handlingResult,
    case_summary:         caseSummary,
    snapshot_name:        sub.name,
    snapshot_email:       sub.email,
    snapshot_phone:       sub.phone        || null,
    snapshot_source:      sub.source       || null,
    snapshot_interests:   sub.interests    || null,
    snapshot_satisfaction: sub.satisfaction || null,
    snapshot_suggestion:  sub.suggestion   || null,
    snapshot_submitted_at: sub.submitted_at,
  });

  btn.disabled = false;
  btn.textContent = '確認結案';

  if (error) {
    showToast('❌ 結案失敗：' + error.message, 'error');
    return;
  }

  const idx = S.submissions.findIndex(s => s.id === S.pendingId);
  if (idx !== -1) S.submissions[idx].status = '已結案';

  hideCloseCaseModal();
  closeDetail();
  updateCounts();
  applyFilter();
  showToast('✅ 結案成功，紀錄已永久保存');
}

function exportCSV() {
  if (S.caseRecords.length === 0) {
    showToast('目前沒有結案紀錄可匯出', 'error');
    return;
  }

  const headers = [
    '結案時間', '填寫者姓名', '填寫者Email', '填寫者電話',
    '原始填寫時間', '來源管道', '感興趣主題', '整體滿意度', '建議與想法',
    '處理人員', '處理結果', '案件摘要'
  ];

  const clean = v => String(v ?? '').replace(/"/g, '""');

  const rows = S.caseRecords.map(r => [
    fmt(r.closed_at),
    clean(r.snapshot_name),
    clean(r.snapshot_email),
    clean(r.snapshot_phone),
    fmt(r.snapshot_submitted_at),
    clean(r.snapshot_source),
    clean(r.snapshot_interests),
    r.snapshot_satisfaction ?? '',
    clean(r.snapshot_suggestion),
    clean(r.handler_name),
    clean(r.handling_result),
    clean(r.case_summary),
  ].map(v => `"${v}"`));

  const csv = '﻿' + [headers.map(h => `"${h}"`), ...rows]
    .map(r => r.join(',')).join('\r\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {
    href: url,
    download: `結案紀錄_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '-')}.csv`
  });
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ CSV 已匯出');
}

let calYear   = new Date().getFullYear();
let calMonth  = new Date().getMonth(); // 0-indexed
let S_shifts  = {};   // { 'YYYY-MM-DD': shift_number }
let _calDirty = false;

async function loadCalendar() {
  const y  = calYear;
  const m  = calMonth;
  const first = `${y}-${String(m + 1).padStart(2, '0')}-01`;
  const last  = new Date(y, m + 1, 0).toISOString().split('T')[0];

  const { data, error } = await sb
    .from('shift_calendar')
    .select('date, shift_number')
    .gte('date', first)
    .lte('date', last);

  if (error) showToast('❌ 月曆載入失敗，請確認資料表已建立', 'error');

  S_shifts = {};
  (data || []).forEach(r => { S_shifts[r.date] = r.shift_number; });
  _calDirty = false;
  renderCalendar();
}

function renderCalendar() {
  const y = calYear;
  const m = calMonth;

  document.getElementById('calTitle').textContent = `${y} 年 ${m + 1} 月`;

  const today      = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Taipei' });
  const firstDow   = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  let html = '';
  for (let i = 0; i < firstDow; i++) {
    html += '<div class="cal-cell empty"></div>';
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const shift   = S_shifts[dateStr] || '';
    const isToday = dateStr === today;
    html += `
      <div class="cal-cell${isToday ? ' today' : ''}">
        <span class="cal-day">${d}</span>
        <select class="cal-select" id="cal-${dateStr}" onchange="_calDirty=true">
          <option value="">–</option>
          ${[1, 2, 3, 4, 5].map(n =>
            `<option value="${n}"${shift == n ? ' selected' : ''}>番${n}</option>`
          ).join('')}
        </select>
      </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

function prevMonth() {
  if (_calDirty && !confirm('有未儲存的排班，確定要離開？')) return;
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  loadCalendar();
}

function nextMonth() {
  if (_calDirty && !confirm('有未儲存的排班，確定要離開？')) return;
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  loadCalendar();
}

async function saveCalendar() {
  const y = calYear;
  const m = calMonth;
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  const upserts = [];
  const deletes = [];

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const sel     = document.getElementById(`cal-${dateStr}`);
    const val     = sel?.value;

    if (val) {
      upserts.push({ date: dateStr, shift_number: parseInt(val) });
    } else if (S_shifts[dateStr]) {
      deletes.push(dateStr);
    }
  }

  let err;
  if (upserts.length > 0) {
    const { error } = await sb.from('shift_calendar').upsert(upserts);
    err = error;
  }
  if (!err && deletes.length > 0) {
    const { error } = await sb.from('shift_calendar').delete().in('date', deletes);
    err = error;
  }

  if (err) { showToast('❌ 儲存失敗：' + err.message, 'error'); return; }

  upserts.forEach(r => { S_shifts[r.date] = r.shift_number; });
  deletes.forEach(d => { delete S_shifts[d]; });
  _calDirty = false;

  showToast(`✅ ${y} 年 ${m + 1} 月排班已儲存`);
}

// ════════════════════════════════════════════════════════
// REALTIME
// ════════════════════════════════════════════════════════
function setupRealtime() {
  sb.channel('rt-admin')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'submissions' },
      () => loadSubmissions()
    )
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'case_records' },
      () => { if (!document.getElementById('view-cases').hidden) loadCaseRecords(); }
    )
    .subscribe();
}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function fmt(d) {
  if (!d) return '–';
  return new Date(d).toLocaleString('zh-TW', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}

function statusCls(s) {
  return { '新進': 'new', '處理中': 'proc', '已結案': 'done' }[s] || 'new';
}

function esc(v) {
  return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let _toastTimer;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'error' ? ' error' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeAllModals();
    closeDetail();
  }
});

initAuth();
</script>
